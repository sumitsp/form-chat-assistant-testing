name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPECTED_REPO: sumitsp/form-chat-assistant-testing

    steps:
      - name: Assert expected GitHub repository
        run: |
          test "${GITHUB_REPOSITORY}" = "${EXPECTED_REPO}" || {
            echo "This workflow is restricted to ${EXPECTED_REPO}. Current: ${GITHUB_REPOSITORY}"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke check
        run: |
          python -c "import backend.api; import backend.batch_excel_report; print('import-ok')"

      - name: Report generation smoke check
        run: |
          python -c "from backend.batch_excel_report import build_template_xlsx_bytes, build_batch_report_pdf_bytes; x=build_template_xlsx_bytes(); p=build_batch_report_pdf_bytes(x); print(len(p))"

      - name: Docker build check
        run: docker build -t form-chat-assistant-ci .
